// 놓아보기
// ══════════════════════════════
function toggleTry(){
  if(tryMode==='placing'){
    // 놓아보기 초기화: 스냅샷 복원 (저장 안 함 = 폐기)
    restoreTrySnapshot();tryMode='ready';cands=[];aGen++;
    exitCommentEditMode();
    // 기존 후보수 복원
    if(currentMove>0&&sgfCandidates[currentMove-1]){
      cands=sgfCandidates[currentMove-1];
    }else if(currentMove===0&&initCands){
      cands=initCands;
    }
    draw();updateTurnHighlight();toast('놓아보기 초기화');
    // 후보수 없고 AI 연결 시 분석 요청
    if(aiMode&&analysisEnabled&&!analysisPaused&&!cands.length) scheduleAnalysis();
  }else if(tryMode==='ready'){
    tryMode='off';toast('놓아보기 꺼짐');
  }else{
    if(totalMoves>0){tryMode='ready';toast('놓아보기 준비');}
    else{toast('SGF 파일 필요');return;}
  }
  updateTryBtn();
}
function updateTryBtn(){
  const bw=document.getElementById('bwContainer');
  bw.className='bw';
  // 착점 분석 모드면 bw에 probe-mode 유지
  if(probeMode) bw.classList.add('probe-mode');
  if(tryMode==='ready') bw.classList.add('try-ready');
  else if(tryMode==='placing'){
    // 놓아보기 진입 시 착점 분석 해제
    if(probeMode){probeMode=false;probeMarkers=[];document.getElementById('btnProbe').classList.remove('at');bw.classList.remove('probe-mode')}
    bw.classList.add('try-placing');
  }
  // 두 버튼(메인/Remote) 모두 업데이트
  [['tryBtn','tryBtnIcon'],['tryBtnRemote','tryBtnIconRemote']].forEach(([btnId,iconId])=>{
    const btn=document.getElementById(btnId);
    if(!btn) return;
    btn.className='try-btn';
    btn.innerHTML=`<span class="try-btn-icon" id="${iconId}"></span>`;
    if(tryMode==='ready'){btn.title='놓아보기 (준비)';}
    else if(tryMode==='placing'){
      btn.title='초기화 (Esc)';btn.classList.add('placing');
      btn.innerHTML='<span style="font-size:18px;line-height:1">↩</span>';
    }
    else{btn.title='놓아보기 (꺼짐)';btn.classList.add('off')}
  });
}
function saveTrySnapshot(){
  trySnapshot={
    board:board.map(r=>[...r]),cp,lm:lm?[...lm]:null,
    // 각 놓아보기 수마다 복원할 수 있도록 보드 상태를 저장
    boards:[]
  };
}
function restoreTrySnapshot(){
  if(!trySnapshot)return;
  board=trySnapshot.board.map(r=>[...r]);cp=trySnapshot.cp;
  lm=trySnapshot.lm?[...trySnapshot.lm]:null;trySnapshot=null;tryMoveLog=[];tryViewIdx=0;
  exitCommentEditMode();
}
// 놓아보기를 특정 인덱스까지만 재현 (0 = 놓아보기 전 상태)
function restoreTryToIndex(idx){
  if(!trySnapshot)return;
  board=trySnapshot.board.map(r=>[...r]);
  cp=trySnapshot.cp;
  lm=trySnapshot.lm?[...trySnapshot.lm]:null;
  for(let i=0;i<idx;i++){
    const mv=tryMoveLog[i];
    applyMoveSilent(mv.r,mv.c,mv.color);
    lm=[mv.r,mv.c];
    cp=mv.color===B?W:B;
  }
  tryViewIdx=idx;
}
function placeManual(r,c){
  if(tryMode==='off')return;
  if(board[r][c]!==E){toast('이미 돌이 있음');return}
  const tmp=board.map(row=>[...row]);tmp[r][c]=cp;
  const opp=cp===B?W:B;let hasCap=false;
  for(const[nr,nc]of gNbr(r,c)){
    if(tmp[nr][nc]===opp&&gGrpOn(tmp,nr,nc).liberties===0){
      hasCap=true;gGrpOn(tmp,nr,nc).stones.forEach(([sr,sc])=>tmp[sr][sc]=E);
    }
  }
  if(!hasCap&&gGrpOn(tmp,r,c).liberties===0){return}
  if(tryMode==='ready'){saveTrySnapshot();tryMoveLog=[];tryViewIdx=0;}
  // 현재 보고 있는 위치가 마지막이 아니면, 그 뒤의 수를 잘라냄
  if(tryViewIdx<tryMoveLog.length){
    tryMoveLog=tryMoveLog.slice(0,tryViewIdx);
    // 보드를 tryViewIdx까지 재현
    restoreTryToIndex(tryViewIdx);
  }
  const wasReady=(tryMode==='ready');
  tryMode='placing';updateTryBtn();
  // 처음 놓아보기 진입 시 해설 편집 모드
  if(wasReady) enterCommentEditMode();
  const placedColor=cp;
  applyMove(r,c,cp);lm=[r,c];cp=cp===B?W:B;
  tryMoveLog.push({r,c,color:placedColor});
  tryViewIdx=tryMoveLog.length;
  cands=[];pvHoverIdx=-1;sPV=false;pvConfirmed=false;aGen++;
  draw();updateTurnHighlight();
  if(aiMode&&analysisEnabled&&!analysisPaused) scheduleAnalysis();
}

// ══════════════════════════════
// 승률 그래프
// ══════════════════════════════
function drawGraph(){
  const canvas=document.getElementById('winrateGraph');
  // CSS가 width:100%로 부모 패널에 맞추므로, offsetWidth로 실제 표시 폭을 읽되
  // canvas.style.width는 건드리지 않음 (그러지 않으면 레이아웃 변경 후에도 작은 폭 유지)
  const W2=canvas.offsetWidth||280;
  const isMax=document.body.classList.contains('panel-bottom');
  const H2=isMax?Math.min(320,Math.max(150,W2*0.22)):150;
  canvas.width=W2*devicePixelRatio;canvas.height=H2*devicePixelRatio;
  canvas.style.height=H2+'px';
  const gx=canvas.getContext('2d');
  gx.scale(devicePixelRatio,devicePixelRatio);
  gx.clearRect(0,0,W2,H2);

  const PAD_L=30,PAD_R=10,PAD_T=12,PAD_B=20;
  const gW=W2-PAD_L-PAD_R, gH=H2-PAD_T-PAD_B;

  // ── 테마 토큰 ──
  const isLight = document.documentElement.getAttribute('data-theme')==='light';
  const cs = getComputedStyle(document.documentElement);
  const accent = (cs.getPropertyValue('--accent').trim() || (isLight?'#A66E2C':'#F2C166'));
  const T = isLight ? {
    bg0:'rgba(252,252,253,1)', bg1:'rgba(245,246,248,1)',
    grid:'rgba(15,18,25,.06)', gridMid:'rgba(15,18,25,.22)',
    axis:'rgba(15,18,25,.10)',
    label:'rgba(15,18,25,.45)', labelMid:'rgba(15,18,25,.65)',
    fillBTop:'rgba(15,18,25,.0)', fillBBot:'rgba(15,18,25,.30)',
    fillWTop:'rgba(220,225,235,.55)', fillWBot:'rgba(220,225,235,.0)',
    lineHi:'rgba(15,18,25,.85)', lineLo:'rgba(120,128,140,.85)',
    lineEdge:'rgba(15,18,25,.30)',
    dotRing:'rgba(255,255,255,.98)',
    bottomLabel:'rgba(15,18,25,.42)'
  } : {
    bg0:'rgba(22,22,28,1)', bg1:'rgba(14,14,18,1)',
    grid:'rgba(255,255,255,.05)', gridMid:'rgba(255,255,255,.18)',
    axis:'rgba(255,255,255,.08)',
    label:'rgba(255,255,255,.35)', labelMid:'rgba(255,255,255,.55)',
    fillBTop:'rgba(0,0,0,.0)', fillBBot:'rgba(0,0,0,.55)',
    fillWTop:'rgba(245,245,247,.32)', fillWBot:'rgba(245,245,247,.0)',
    lineHi:'rgba(245,245,247,.95)', lineLo:'rgba(60,60,68,.85)',
    lineEdge:'rgba(255,255,255,.10)',
    dotRing:'rgba(0,0,0,.7)',
    bottomLabel:'rgba(255,255,255,.30)'
  };

  // ── 배경 ──
  const bgGrad=gx.createLinearGradient(0,0,0,H2);
  bgGrad.addColorStop(0,T.bg0);
  bgGrad.addColorStop(1,T.bg1);
  gx.fillStyle=bgGrad;
  gx.roundRect(0,0,W2,H2,8);gx.fill();

  // ── 격자선 ──
  const gridLines=[{v:100,label:'B'},{v:75,label:''},{v:50,label:'50'},{v:25,label:''},{v:0,label:'W'}];
  gx.font=`bold 10px 'JetBrains Mono', ui-monospace, sans-serif`;
  gx.textBaseline='middle';
  gridLines.forEach(({v,label})=>{
    const y=PAD_T+gH*(1-v/100);
    if(v===50){
      gx.strokeStyle=T.gridMid;gx.lineWidth=1;gx.setLineDash([3,3]);
    }else{
      gx.strokeStyle=T.grid;gx.lineWidth=0.6;gx.setLineDash([]);
    }
    gx.beginPath();gx.moveTo(PAD_L,y);gx.lineTo(W2-PAD_R,y);gx.stroke();
    gx.setLineDash([]);
    if(label){
      gx.textAlign='right';
      gx.fillStyle=v===50?T.labelMid:T.label;
      gx.fillText(label,PAD_L-4,y);
    }
  });

  // 좌측 구분선
  gx.strokeStyle=T.axis;gx.lineWidth=1;gx.setLineDash([]);
  gx.beginPath();gx.moveTo(PAD_L,PAD_T);gx.lineTo(PAD_L,PAD_T+gH);gx.stroke();

  // 데이터
  const pts=[];
  sgfWinrates.forEach((wr,i)=>{if(wr!==null)pts.push({x:i+1,wr})});

  const toX=i=>PAD_L+gW*(totalMoves>0?i/totalMoves:0);
  const toY=bwr=>PAD_T+gH*(1-bwr/100);
  const mid=PAD_T+gH*0.5;

  if(pts.length){
    // ── 영역 채우기: 흑 유리 구간 (선 아래 = bwr>50) ──
    gx.beginPath();
    gx.moveTo(toX(pts[0].x),mid);
    pts.forEach(p=>{const y=toY(p.wr);gx.lineTo(toX(p.x),y>mid?y:mid)});
    gx.lineTo(toX(pts[pts.length-1].x),mid);
    gx.closePath();
    const fillB=gx.createLinearGradient(0,mid,0,PAD_T+gH);
    fillB.addColorStop(0,T.fillBTop);
    fillB.addColorStop(1,T.fillBBot);
    gx.fillStyle=fillB;gx.fill();

    // ── 영역 채우기: 백 유리 구간 (선 위 = bwr<50) ──
    gx.beginPath();
    gx.moveTo(toX(pts[0].x),mid);
    pts.forEach(p=>{const y=toY(p.wr);gx.lineTo(toX(p.x),y<mid?y:mid)});
    gx.lineTo(toX(pts[pts.length-1].x),mid);
    gx.closePath();
    const fillW=gx.createLinearGradient(0,PAD_T,0,mid);
    fillW.addColorStop(0,T.fillWTop);
    fillW.addColorStop(1,T.fillWBot);
    gx.fillStyle=fillW;gx.fill();

    // ── 메인 승률 선 (흑 영역=짙게, 백 영역=밝게) ──
    // 메인 승률 선 (단색, 그라디언트 제거)
    gx.beginPath();
    pts.forEach((p,i)=>i===0?gx.moveTo(toX(p.x),toY(p.wr)):gx.lineTo(toX(p.x),toY(p.wr)));
    gx.strokeStyle=T.lineHi;gx.lineWidth=1.8;
    gx.lineJoin='round';gx.lineCap='round';gx.stroke();
  }else{
    gx.fillStyle=T.label;gx.font='10px sans-serif';
    gx.textAlign='center';gx.textBaseline='middle';
  }

  // ── 현재 수 세로선 + 점 ──
  if(currentMove>0&&totalMoves>0){
    const cx2=toX(currentMove);
    gx.strokeStyle=accent+'e6';gx.lineWidth=1.5;gx.setLineDash([]);
    gx.globalAlpha=0.85;
    gx.beginPath();gx.moveTo(cx2,PAD_T);gx.lineTo(cx2,PAD_T+gH);gx.stroke();
    gx.globalAlpha=1;

    const wrNow=sgfWinrates[currentMove-1];
    if(wrNow!==null){
      const cy=toY(wrNow);
      gx.beginPath();gx.arc(cx2,cy,5,0,Math.PI*2);
      gx.fillStyle=T.dotRing;gx.fill();
      gx.beginPath();gx.arc(cx2,cy,3.2,0,Math.PI*2);
      gx.fillStyle=accent;gx.fill();
      // 수치 레이블
      gx.font=`bold 11px 'JetBrains Mono', ui-monospace, sans-serif`;
      const isRight=cx2>W2-70;
      gx.textAlign=isRight?'right':'left';
      gx.textBaseline='bottom';
      gx.fillStyle=accent;
      gx.fillText(wrNow.toFixed(1)+'%',isRight?cx2-7:cx2+7,cy-2);
    }
  }

  // ── 하단 수 라벨 ──
  if(totalMoves>0){
    gx.font=`10px 'JetBrains Mono', ui-monospace, sans-serif`;
    gx.textAlign='center';gx.textBaseline='top';
    gx.fillStyle=T.bottomLabel;
    const steps=[0,Math.round(totalMoves/4),Math.round(totalMoves/2),Math.round(totalMoves*3/4),totalMoves];
    steps.forEach(s=>{
      const x=toX(s);
      gx.fillText(String(s),x,PAD_T+gH+3);
    });
  }
}

function graphClick(e){
  if(!totalMoves)return;
  const canvas=document.getElementById('winrateGraph');
  const rect=canvas.getBoundingClientRect();
  const PAD_L=30,PAD_R=10;
  const x=e.clientX-rect.left-PAD_L;
  const gW=rect.width-PAD_L-PAD_R;
  goToMove(Math.max(0,Math.round(Math.max(0,x)/gW*totalMoves)));
}

// ══════════════════════════════
// 바둑판 그리기
// ══════════════════════════════
function draw(){
  const m=margin,sz=cv.width;
  ctx.clearRect(0,0,sz,sz);
  ctx.strokeStyle='#000';ctx.lineWidth=1.5;ctx.strokeRect(m,m,(BS-1)*cs,(BS-1)*cs);
  ctx.lineWidth=0.8;
  for(let i=1;i<BS-1;i++){
    const p=m+i*cs;
    ctx.beginPath();ctx.moveTo(m,p);ctx.lineTo(m+(BS-1)*cs,p);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p,m);ctx.lineTo(p,m+(BS-1)*cs);ctx.stroke();
  }
  ctx.fillStyle='#000';
  [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]].forEach(([r,c])=>{
    ctx.beginPath();ctx.arc(m+c*cs,m+r*cs,cs*.12,0,Math.PI*2);ctx.fill();
  });
  if(showCoords){
    ctx.font=`bold 13px sans-serif`;
    ctx.fillStyle='#222222';ctx.textAlign='center';ctx.textBaseline='middle';
    const co=m*.18,far=m+(BS-1)*cs+m*(1-.18);
    for(let i=0;i<BS;i++){
      ctx.fillText(cL[i],m+i*cs,co);ctx.fillText(cL[i],m+i*cs,far);
      ctx.fillText(String(BS-i),co,m+i*cs);ctx.fillText(String(BS-i),far,m+i*cs);
    }
  }
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(board[r][c]!==E)dStone(r,c,board[r][c]);

  // ── 형세 오버레이 ──
  if(showTerritory&&ownData.length===BS*BS){
    // 빈 교차점: 집 표시
    for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
      const v=ownData[r*BS+c];
      if(board[r][c]===E){
        if(Math.abs(v)<terrThresh)continue;
        const x=m+c*cs,y=m+r*cs,sz2=cs*.24;
        ctx.fillStyle=v>0?'rgba(20,20,20,.85)':'rgba(255,255,255,.9)';
        ctx.fillRect(x-sz2,y-sz2,sz2*2,sz2*2);
      }
    }
    // 사석 표시
    for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
      if(board[r][c]===E)continue;
      const v=ownData[r*BS+c];
      const isDead=(board[r][c]===B&&v<-deadThresh)||(board[r][c]===W&&v>deadThresh);
      if(isDead){
        const x=m+c*cs,y=m+r*cs;
        ctx.beginPath();ctx.moveTo(x-cs*.25,y-cs*.25);ctx.lineTo(x+cs*.25,y+cs*.25);
        ctx.moveTo(x+cs*.25,y-cs*.25);ctx.lineTo(x-cs*.25,y+cs*.25);
        ctx.strokeStyle='rgba(255,69,58,.95)';ctx.lineWidth=3;ctx.stroke();
      }
    }
  }

  if(showMoveNums&&sgfMoves.length&&currentMove>0){
    if(moveNumMode===2){
      // 최신수만 표시
      let lastMv=null,lastIdx=-1;
      for(let i=currentMove-1;i>=0;i--){const mv=sgfMoves[i];if(!mv.pass){const rr=mv.r,cc=mv.c;if(board[rr][cc]!==E){lastMv=mv;lastIdx=i+1;break}}}
      if(lastMv){
        const x=m+lastMv.c*cs,y=m+lastMv.r*cs,fs=Math.max(12,cs*.35);
        ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle=board[lastMv.r][lastMv.c]===B?'rgba(255,255,255,.9)':'rgba(0,0,0,.8)';
        ctx.fillText(String(lastIdx),x,y);
      }
    }else{
      // 전체수순 표시
      const nm={};
      for(let i=0;i<currentMove;i++){const mv=sgfMoves[i];if(!mv.pass)nm[mv.r*BS+mv.c]=i+1}
      const fs=Math.max(12,cs*.35);
      ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      for(const k in nm){
        const ri=Math.floor(parseInt(k)/BS),ci=parseInt(k)%BS;
        if(board[ri][ci]===E)continue;
        ctx.fillStyle=board[ri][ci]===B?'rgba(255,255,255,.9)':'rgba(0,0,0,.8)';
        ctx.fillText(String(nm[k]),m+ci*cs,m+ri*cs);
      }
    }
  }else if(tryMode==='placing'&&tryMoveLog.length>0&&tryViewIdx>0){
    // ── 놓아보기: 같은 좌표 → 마지막 수만 표시 ──
    // 좌표별 마지막 인덱스 맵 만들기
    const lastAt={};
    for(let i=0;i<tryViewIdx;i++){
      const mv=tryMoveLog[i];
      if(board[mv.r][mv.c]!==E) lastAt[mv.r*BS+mv.c]=i;
    }
    // 내부 링 — 항상 표시 (마지막 수만)
    for(const key in lastAt){
      const i=lastAt[key];
      const mv=tryMoveLog[i];
      const x=m+mv.c*cs,y=m+mv.r*cs;
      const stoneColor=board[mv.r][mv.c];
      ctx.save();
      ctx.beginPath();ctx.arc(x,y,cs*.34,0,Math.PI*2);
      ctx.strokeStyle=stoneColor===B?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.5)';
      ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }
    // 수순 번호 — 참고도 볼 때는 숨김 (마지막 수만)
    if(!sPV){
      const fs=Math.max(12,cs*.35);
      ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      for(const key in lastAt){
        const i=lastAt[key];
        const mv=tryMoveLog[i];
        const x=m+mv.c*cs,y=m+mv.r*cs;
        const stoneColor=board[mv.r][mv.c];
        ctx.fillStyle=stoneColor===B?'rgba(255,255,255,.9)':'rgba(0,0,0,.8)';
        ctx.fillText(String(i+1),x,y);
      }
    }
  }else if(varViewActive&&sgfVariations[varViewMoveIdx]&&sgfVariations[varViewMoveIdx][varViewVarIdx]){
    // ── 참고도 보기: 변화도 수순 번호 표시 ──
    const varMoves=sgfVariations[varViewMoveIdx][varViewVarIdx].moves;
    const lastAt={};
    for(let i=0;i<varViewPos&&i<varMoves.length;i++){
      const mv=varMoves[i];
      if(board[mv.r][mv.c]!==E) lastAt[mv.r*BS+mv.c]=i;
    }
    for(const key in lastAt){
      const i=lastAt[key];
      const mv=varMoves[i];
      const x=m+mv.c*cs,y=m+mv.r*cs;
      const stoneColor=board[mv.r][mv.c];
      ctx.save();
      ctx.beginPath();ctx.arc(x,y,cs*.34,0,Math.PI*2);
      ctx.strokeStyle=stoneColor===B?'rgba(242,193,102,0.6)':'rgba(242,193,102,0.6)';
      ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }
    const fs=Math.max(12,cs*.35);
    ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    for(const key in lastAt){
      const i=lastAt[key];
      const mv=varMoves[i];
      const x=m+mv.c*cs,y=m+mv.r*cs;
      const stoneColor=board[mv.r][mv.c];
      ctx.fillStyle=stoneColor===B?'rgba(255,255,255,.9)':'rgba(0,0,0,.8)';
      ctx.fillText(String(i+1),x,y);
    }
  }else if(lm){
    const[lr,lc]=lm;
    const cx=m+lc*cs,cy=m+lr*cs,rad=cs*.48;
    // 삼각형: 꼭지점이 돌 중앙, 우하 방향으로 펼침
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+rad*.85,cy);
    ctx.lineTo(cx,cy+rad*.85);
    ctx.closePath();
    ctx.fillStyle=board[lr][lc]===B?'rgba(255,255,255,.85)':'rgba(0,0,0,.85)';ctx.fill();
  }

  // 다음수 반투명 돌 (후보수 아래에 깔림)
  if(!showTerritory&&!varViewActive&&nextMoveStyle!=='off'&&currentMove<totalMoves&&!sgfMoves[currentMove].pass&&tryMode!=='placing'){
    const nmv=sgfMoves[currentMove];
    const nx=m+nmv.c*cs,ny=m+nmv.r*cs,nrad=cs*.48;
    ctx.save();
    ctx.beginPath();ctx.arc(nx,ny,nrad,0,Math.PI*2);
    const g=ctx.createRadialGradient(nx-nrad*.3,ny-nrad*.3,nrad*.1,nx,ny,nrad);
    if(nmv.color===B){
      g.addColorStop(0,'rgba(74,74,74,0.25)');g.addColorStop(.4,'rgba(26,26,26,0.25)');g.addColorStop(1,'rgba(10,10,10,0.25)');
    }else{
      g.addColorStop(0,'rgba(245,245,243,0.3)');g.addColorStop(.7,'rgba(224,222,217,0.3)');g.addColorStop(1,'rgba(200,198,194,0.3)');
    }
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }

  // PV hover or 후보수
  if(!showTerritory){
    if(probeMode){
      // 착점 분석 모드: 후보수 그리되, 착점 분석한 위치는 건너뜀
      if(cands.length)dCandsExcluding(probeMarkers);
      drawProbeMarkers();
    }else if(sPV&&pvHoverIdx>=0&&cands[pvHoverIdx])dPV(pvHoverIdx);
    else if(cands.length)dCands();
  }

  // 다음수 링 (후보수 위에 표시 — 링이 우선)
  if(!showTerritory&&!varViewActive&&nextMoveStyle!=='off'&&currentMove<totalMoves&&!sgfMoves[currentMove].pass&&tryMode!=='placing'){
    const nmv=sgfMoves[currentMove];
    const nx=m+nmv.c*cs,ny=m+nmv.r*cs;
    const ringColors={gray:'rgba(60,60,60,0.7)'};
    let ringColor=ringColors[nextMoveStyle]||ringColors.gray;
    if(nextMoveStyle==='bw') ringColor=nmv.color===B?'rgba(10,10,10,0.85)':'rgba(240,240,240,0.85)';
    ctx.save();
    ctx.beginPath();ctx.arc(nx,ny,cs*.48,0,Math.PI*2);
    ctx.strokeStyle=ringColor;
    ctx.lineWidth=3.0;ctx.stroke();
    ctx.restore();
  }
}

function _candText(x,y,text,fs,isBlk,isMain){

function dCands(){
  const m=margin,rad=cs*.48;
  const isBlk=candTextColor==='black';
  cands.forEach((cd,i)=>{
    if(i>=maxCands)return;
    const coord=cd.move.toUpperCase().trim();if(coord==='PASS')return;

    if(ac<0||ar<0||ar>=BS||board[ar][ac]!==E)return;
    const x=m+ac*cs,y=m+ar*cs,top=(i===0);
    ctx.save();
    if(top){ctx.shadowColor='rgba(50,145,230,0.45)';ctx.shadowBlur=10}

    ctx.fill();ctx.restore();
    const wr=cd.winrate!==undefined?cd.winrate.toFixed(1):'?';
    const sl=cd.scoreLead!==undefined?(cd.scoreLead>=0?'+':'')+cd.scoreLead.toFixed(1):null;
    const dual=(candDisplay==='wr_sl'||candDisplay==='sl_wr')&&sl!==null;

      ctx.font=`bold ${botFs}px sans-serif`;
      ctx.save();ctx.translate(0,gap);_candText(x,y,botText,botFs,isBlk,false);ctx.restore();

function dPV(idx){
  const cd=cands[idx];
  if(!cd||!cd.pv||!cd.pv.length){dCands();return}
  const m=margin,rad=cs*.48;
  // PV 변화도 — go_board 스타일: 반투명 돌 + 파란 테두리 + 수순 번호
  let pvColor=cp;
  cd.pv.forEach((mv,i)=>{
    const coord=mv.toUpperCase().trim();
    if(coord==='PASS'){pvColor=pvColor===B?W:B;return}
    const ac=cL.indexOf(coord[0]),ar=BS-parseInt(coord.substring(1));
    if(ac<0||ar<0||ar>=BS)return;
    if(board[ar][ac]!==E&&i!==0){pvColor=pvColor===B?W:B;return}
    const x=m+ac*cs,y=m+ar*cs,isFirst=(i===0);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=3;ctx.shadowOffsetY=1;
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
    const g=ctx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.1,x,y,rad);
    if(pvColor===B){
      g.addColorStop(0,'rgba(70,70,70,0.78)');g.addColorStop(.4,'rgba(28,28,28,0.78)');g.addColorStop(1,'rgba(8,8,8,0.78)');
    }else{
      g.addColorStop(0,'rgba(248,248,246,0.82)');g.addColorStop(.7,'rgba(228,226,221,0.82)');g.addColorStop(1,'rgba(205,203,199,0.82)');
    }
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle=isFirst?'rgba(41,128,205,0.85)':'rgba(41,128,205,0.5)';
    ctx.lineWidth=isFirst?2.5:1.5;ctx.stroke();
    ctx.restore();
    // 수순 번호
    const fs=Math.max(14,cs*.42);
    ctx.save();ctx.font=`bold ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    if(pvColor===B){ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=2.5;ctx.strokeText(String(i+1),x,y);ctx.fillStyle='#fff'}
    else{ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2.5;ctx.strokeText(String(i+1),x,y);ctx.fillStyle='#111'}
    ctx.fillText(String(i+1),x,y);ctx.restore();
    pvColor=pvColor===B?W:B;
  });
}

function gNbr(r,c){
  const n=[];
  if(r>0)n.push([r-1,c]);if(r<BS-1)n.push([r+1,c]);
  if(c>0)n.push([r,c-1]);if(c<BS-1)n.push([r,c+1]);
  return n;
}
function gGrpOn(bd,r,c){
  const color=bd[r][c];if(color===E)return{stones:[],liberties:0};
  const vis=new Set(),stones=[],libs=new Set(),stk=[[r,c]];
  while(stk.length){
    const[cr,cc]=stk.pop(),k=cr*BS+cc;
    if(vis.has(k))continue;vis.add(k);stones.push([cr,cc]);
    for(const[nr,nc]of gNbr(cr,cc)){
      const nk=nr*BS+nc;
      if(bd[nr][nc]===E)libs.add(nk);
      else if(bd[nr][nc]===color&&!vis.has(nk))stk.push([nr,nc]);
    }
  }
  return{stones,liberties:libs.size};
}

async function setVisitsToServer(v){

  if(!url||!aiMode)return;

  try{
    await fetch(url+'/set_visits',{method:'POST',headers:{'Content-Type':'application/json'},

async function reqAnalysis(){
  const url=document.getElementById('apiUrl').value.trim();
  if(!url||!aiMode||analysisPaused||!analysisEnabled||bulkRunning)return;
  if(apiLock){pendingAnalysis=true;return}
  const myGen=++aGen;
  apiLock=true;
  pendingAnalysis=false;
  const clr=cp===B?'black':'white';
  const visits=getVisits();
  document.getElementById('tho').textContent='분석 중...';
  document.getElementById('tho').classList.add('show');
  try{
    // 0) visits 설정
    await setVisitsToServer(visits);
    // 1) 현재 수순을 서버에 동기화
    await syncToServer(url);
    if(myGen!==aGen){apiLock=false;document.getElementById('tho').classList.remove('show');if(pendingAnalysis){pendingAnalysis=false;reqAnalysis()}return}
    // 2) 분석 요청 (duration은 타임아웃 역할, visits 도달 시 조기종료)
    const resp=await fetch(url+'/analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({color:clr,duration:60,rules:currentRules})
    });
    const data=await resp.json();
    apiLock=false;
    document.getElementById('tho').classList.remove('show');
    if(myGen!==aGen){
      if(pendingAnalysis){pendingAnalysis=false;reqAnalysis()}
      return;
    }
    pendingAnalysis=false;
    // 응답: data.moves (후보수 배열), data.scoreLead, data.ownership
    if(data.moves&&data.moves.length){
      cands=data.moves.slice(0,maxCands).map(c=>({
        move:c.move,
        winrate:c.winrate!==undefined?normalizeWR(c.winrate):undefined,
        scoreLead:c.scoreLead!==undefined?c.scoreLead:undefined,
        pv:c.pv||[]
      }));
      // 개별 분석 결과도 저장 (놓아보기/참고도 보기 중이 아닐 때)
      if(tryMode!=='placing'&&!varViewActive&&currentMove>0){
        sgfCandidates[currentMove-1]=cands;
      }
      if(cands[0]&&cands[0].winrate!==undefined){
        const bwr=clr==='black'?cands[0].winrate:(100-cands[0].winrate);
        let sl=null;
        if(data.scoreLead!==undefined) sl=clr==='black'?data.scoreLead:-data.scoreLead;
        else if(data.moves[0].scoreLead!==undefined) sl=clr==='black'?data.moves[0].scoreLead:-data.moves[0].scoreLead;
        setWinrateUI(bwr,'KataGo',sl);
        if(tryMode!=='placing'&&!varViewActive){
          if(currentMove>0){
            sgfWinrates[currentMove-1]=bwr;
            if(sl!==null) sgfScoreLeads[currentMove-1]=sl;
          }
          drawGraph();
        }
      }
      // ownership 저장 (형세 판단용)
      if(data.ownership&&data.ownership.length===BS*BS){
        ownData=clr==='black'?data.ownership:data.ownership.map(v=>-v);
      }
    }
    uStat('connected');draw();
  }catch(err){
    apiLock=false;
    document.getElementById('tho').classList.remove('show');
    uStat('error');
    if(pendingAnalysis){pendingAnalysis=false;setTimeout(()=>reqAnalysis(),500)}
  }
}

// 현재 수순을 서버에 /sync로 전달
async function syncToServer(url){
  const moves=buildMovesForAPI();
  try{
    await fetch(url+'/sync',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({moves,board_size:BS,rules:currentRules})
    });
  }catch{}
}

function buildMovesForAPI(){
  const moves=[];
  for(let i=0;i<currentMove;i++){
    const mv=sgfMoves[i];
    if(mv.pass)moves.push({color:mv.color===B?'black':'white',coord:'pass'});
    else moves.push({color:mv.color===B?'black':'white',coord:cL[mv.c]+String(BS-mv.r)});
  }
  if(varViewActive&&!varEditMode){
    // 참고도 보기 중: 변화도 수순을 pos까지 포함
    const v=sgfVariations[varViewMoveIdx]?sgfVariations[varViewMoveIdx][varViewVarIdx]:null;
    if(v){
      for(let i=0;i<varViewPos&&i<v.moves.length;i++){
        const mv=v.moves[i];
        moves.push({color:mv.color===B?'black':'white',coord:cL[mv.c]+String(BS-mv.r)});
      }
    }
  }else if(tryMode==='placing'){
    for(let i=0;i<tryViewIdx;i++){
      const mv=tryMoveLog[i];
      moves.push({color:mv.color===B?'black':'white',coord:cL[mv.c]+String(BS-mv.r)});
    }
  }
  return moves;
}

  const resetChk=document.getElementById('bulkResetChk');
  if(hasExistingData){
    resetRow.style.display='';
    resetChk.checked=sgfHasSBKV; // SBKV만 있으면 기본 체크
  }else{
    resetRow.style.display='none';
  }

  // 설정 화면 초기화
  document.getElementById('bulkSetup').style.display='';
  document.getElementById('bulkProgress').style.display='none';
  document.getElementById('bulkInfo').textContent=totalMoves+'수 기보'+(analyzedCount>0?' ('+analyzedCount+'수 분석됨)':sgfHasSBKV?' (SBKV 승률 있음)':'');
  updateBulkEstimate();
  document.getElementById('bulkOverlay').classList.add('show');
}

function updateBulkEstimate(){
  const idx=parseInt(document.getElementById('bulkVisitsSl').value)||0;
  const visits=BULK_VISITS_STEPS[idx];
  const estSec=BULK_VISITS_EST_SEC[idx];
  document.getElementById('bulkVisitsVal').textContent=visits+'v';
  const resetChk=document.getElementById('bulkResetChk');
  const analyzed=resetChk&&!resetChk.checked?sgfCandidates.filter(v=>v!==null).length:0;
  const remaining=Math.max(0,totalMoves-analyzed);
  const totalSec=Math.round(remaining*estSec);
  const prefix=analyzed>0?'남은 ':'예상 ';
  document.getElementById('bulkEstimate').textContent=prefix+'시간: 약 '+formatTime(totalSec);
}

function formatTime(sec){
  if(sec<60)return sec+'초';
  const m=Math.floor(sec/60),s=sec%60;
  return s>0?m+'분 '+s+'초':m+'분';
}

function closeBulkOverlay(){
  document.getElementById('bulkOverlay').classList.remove('show');
}

function stopBulkAnalysis(){
  bulkAbort=true;bulkRunning=false;
  document.getElementById('bulkOverlay').classList.remove('show');
  document.getElementById('tho').classList.remove('show');
  toast('분석 중단');
  const url=document.getElementById('apiUrl').value.trim();
  if(url&&aiMode)syncToServer(url);
}

async function executeBulkAnalysis(){
  const url=document.getElementById('apiUrl').value.trim();
  if(!url||!aiMode){toast('AI 연결 필요');return}

  // 새로 분석이면 초기화
  const resetChk=document.getElementById('bulkResetChk');
  if(resetChk&&resetChk.checked){
    sgfWinrates=new Array(totalMoves).fill(null);
    sgfScoreLeads=new Array(totalMoves).fill(null);
    sgfCandidates=new Array(totalMoves).fill(null);
    drawGraph();
    initCands=null;
  }

  // 진행 화면으로 전환
  document.getElementById('bulkSetup').style.display='none';
  document.getElementById('bulkProgress').style.display='';
  document.getElementById('bulkProgBar').style.width='0%';
  document.getElementById('bulkProgLabel').textContent='0 / '+totalMoves+'수 (0%)';
  document.getElementById('bulkProgTime').textContent='남은 시간: 계산 중...';

  bulkAbort=false;bulkRunning=true;
  const visits=getBulkVisits();
  // 탐색량을 설정 패널에도 동기화
  const mainIdx=VISITS_STEPS.indexOf(visits);
  if(mainIdx>=0){
    document.getElementById('visitsSl').value=mainIdx;
    document.getElementById('visitsVal').textContent=visits+'v';
  }
  // 서버에 visits 설정
  await setVisitsToServer(visits);

  document.getElementById('tho').textContent='전체 분석 중...';
  document.getElementById('tho').classList.add('show');

  const moves=[];
  let tmpCp=B;
  const startTime=Date.now();
  let analyzedSoFar=0;

  for(let i=0;i<=totalMoves;i++){
    if(bulkAbort)break;

    // i번째 수의 moves 배열 누적 (건너뛰든 분석하든 필요)
    // 이미 분석된 수는 건너뛰기
    const alreadyDone=(i===0&&initCands!==null)||(i>0&&sgfCandidates[i-1]!==null);

    if(!alreadyDone){
      analyzedSoFar++;
      const pct=Math.round(i/totalMoves*100);
      document.getElementById('bulkProgBar').style.width=pct+'%';
      document.getElementById('bulkProgLabel').textContent=`${i} / ${totalMoves}수 (${pct}%)`;

      if(analyzedSoFar>1){
        const elapsed=(Date.now()-startTime)/1000;
        const avgPerMove=elapsed/analyzedSoFar;
        const remainingMoves=sgfCandidates.slice(i).filter(v=>v===null).length+(initCands===null&&i===0?0:0);
        const remaining=Math.round(avgPerMove*remainingMoves);
        document.getElementById('bulkProgTime').textContent='남은 시간: 약 '+formatTime(remaining);
      }

      try{
        await fetch(url+'/sync',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({moves:[...moves],board_size:BS,rules:currentRules})
        });

        const clr=tmpCp===B?'black':'white';
        const resp=await fetch(url+'/analyze',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({color:clr,duration:60,rules:currentRules})
        });
        const data=await resp.json();

        if(data.moves&&data.moves.length){
          const candsData=data.moves.slice(0,10).map(c=>({
            move:c.move,
            winrate:c.winrate!==undefined?normalizeWR(c.winrate):undefined,
            scoreLead:c.scoreLead!==undefined?c.scoreLead:undefined,
            pv:c.pv||[]
          }));
          if(i===0){
            initCands=candsData;
          }else{
            sgfCandidates[i-1]=candsData;
          }

          if(data.moves[0].winrate!==undefined){
            const wr0=normalizeWR(data.moves[0].winrate);
            const bwr=clr==='black'?wr0:(100-wr0);
            if(i>0) sgfWinrates[i-1]=bwr;
            let sl=null;
            if(data.scoreLead!==undefined) sl=clr==='black'?data.scoreLead:-data.scoreLead;
            else if(data.moves[0].scoreLead!==undefined) sl=clr==='black'?data.moves[0].scoreLead:-data.moves[0].scoreLead;
            if(i>0&&sl!==null) sgfScoreLeads[i-1]=sl;
          }
        }

        drawGraph();
        await new Promise(r=>setTimeout(r,30));
      }catch(e){
        console.warn('bulk step',i,'failed',e);
        await new Promise(r=>setTimeout(r,300));
      }
    }else{
      // 이미 분석된 수 — 프로그레스만 업데이트
      const pct=Math.round(i/totalMoves*100);
      document.getElementById('bulkProgBar').style.width=pct+'%';
      document.getElementById('bulkProgLabel').textContent=`${i} / ${totalMoves}수 (${pct}%) — 건너뜀`;
    }

    // moves 배열 누적 (다음 루프용)
    if(i<totalMoves){
      const mv=sgfMoves[i];
      if(mv.pass){
        moves.push({color:mv.color===B?'black':'white',coord:'pass'});
      }else{
        moves.push({color:mv.color===B?'black':'white',coord:cL[mv.c]+String(BS-mv.r)});
      }
      tmpCp=mv.color===B?W:B;
    }
  }

  bulkRunning=false;
  document.getElementById('tho').classList.remove('show');
  document.getElementById('bulkOverlay').classList.remove('show');

  if(!bulkAbort){
    toast('분석 완료! '+totalMoves+'수');
    drawGraph();
    if(currentMove>0&&sgfCandidates[currentMove-1]){
      cands=sgfCandidates[currentMove-1];
      const wr=sgfWinrates[currentMove-1];
      const sl=sgfScoreLeads[currentMove-1];
      if(wr!==null)setWinrateUI(wr,'전체 분석',sl);
      draw();
    }
  }
  syncToServer(url);
}

// SGF 저장 (분석 데이터 포함)
// ══════════════════════════════
function saveSGFWithAnalysis(){
  if(!totalMoves){toast('저장할 기보 없음');return}
  const cL2='ABCDEFGHJKLMNOPQRST';
  // SGF 좌표 변환 (r,c → ab)
  const toSgfCoord=(r,c)=>String.fromCharCode(97+c)+String.fromCharCode(97+r);

  let sgf='(;FF[4]GM[1]SZ['+BS+']';
  // 메타 정보
  if(sgfInfo.PB)sgf+='PB['+sgfInfo.PB+']';
  if(sgfInfo.PW)sgf+='PW['+sgfInfo.PW+']';
  if(sgfInfo.BR)sgf+='BR['+sgfInfo.BR+']';
  if(sgfInfo.WR)sgf+='WR['+sgfInfo.WR+']';
  if(sgfInfo.KM)sgf+='KM['+sgfInfo.KM+']';
  if(sgfInfo.RE)sgf+='RE['+sgfInfo.RE+']';
  if(sgfInfo.DT)sgf+='DT['+sgfInfo.DT+']';
  if(sgfInfo.EV)sgf+='EV['+sgfInfo.EV+']';
  if(sgfInfo.RU)sgf+='RU['+sgfInfo.RU+']';
  if(sgfInfo.GN)sgf+='GN['+sgfInfo.GN+']';
  if(sgfInfo.RO)sgf+='RO['+sgfInfo.RO+']';
  sgf+='\n';

  // 0수(초기 국면) 분석 데이터를 루트 노드 코멘트에 저장
  if(initCands){
    let gra='GRA:';
    initCands.forEach((c,j)=>{
      const pvStr=c.pv?c.pv.join(' '):'';
      const sl=c.scoreLead!==undefined?c.scoreLead.toFixed(1):'?';
      gra+=(j>0?'\n':'')+'M'+(j+1)+':'+c.move+','+(c.winrate!==undefined?c.winrate.toFixed(1):'?')+','+sl+','+pvStr;
    });
    const escaped=gra.replace(/\]/g,'\\]');
    sgf+='C['+escaped+']\n';
  }

  for(let i=0;i<totalMoves;i++){
    const mv=sgfMoves[i];
    const clr=mv.color===B?'B':'W';
    if(mv.pass){
      sgf+=';'+clr+'[tt]';
    }else{
      sgf+=';'+clr+'['+toSgfCoord(mv.r,mv.c)+']';
    }

    // SBKV 호환 승률
    if(sgfWinrates[i]!==null){
      const bwr=sgfWinrates[i];
      const colorWr=mv.color===B?bwr:(100-bwr);
      sgf+='SBKV['+colorWr.toFixed(2)+']';
    }

    // 코멘트 (원본 보존 + 분석 데이터)
    let commentParts=[];
    // 원본 코멘트 (GRA: / VAR: 블록 제거 후)
    if(mv.comment){
      let cleaned=mv.comment.replace(/GRA:[^\n]*(?:\nM\d+:[^\n]*)*/g,'');
      cleaned=cleaned.replace(/VAR:[^\n]*(?:\n(?:VM:|VC:)[^\n]*)*/g,'').trim();
      if(cleaned) commentParts.push(cleaned);
    }
    // 분석 데이터 블록
    const cd=sgfCandidates[i];
    if(cd||sgfWinrates[i]!==null||sgfScoreLeads[i]!==null){
      let gra='GRA:';
      if(sgfWinrates[i]!==null){
        const bwr=sgfWinrates[i];
        const colorWr=mv.color===B?bwr:(100-bwr);
        gra+='WR:'+colorWr.toFixed(2);
      }
      if(sgfScoreLeads[i]!==null){
        const sl=mv.color===B?sgfScoreLeads[i]:-sgfScoreLeads[i];
        gra+=',SL:'+sl.toFixed(2);
      }
      if(cd){
        cd.forEach((c,j)=>{
          const pvStr=c.pv?c.pv.join(' '):'';
          const sl=c.scoreLead!==undefined?c.scoreLead.toFixed(1):'?';
          gra+='\nM'+(j+1)+':'+c.move+','+(c.winrate!==undefined?c.winrate.toFixed(1):'?')+','+sl+','+pvStr;
        });
      }
      commentParts.push(gra);
    }
    // 참고도 데이터
    if(sgfVariations[i]){
      sgfVariations[i].forEach(v=>{
        let varBlock='VAR:'+v.name;
        const vmParts=v.moves.map(m=>{
          const clr2=m.color===B?'B':'W';
          const coord=cL2[m.c]+String(BS-m.r);
          return clr2+':'+coord;
        });
        varBlock+='\nVM:'+vmParts.join(',');
        if(v.comment) varBlock+='\nVC:'+v.comment.replace(/\n/g,'\\n');
        commentParts.push(varBlock);
      });
    }
    if(commentParts.length){
      const escaped=commentParts.join('\n').replace(/\]/g,'\\]');
      sgf+='C['+escaped+']';
    }
    sgf+='\n';
  }
  sgf+=')';

  // 다운로드
  const blob=new Blob([sgf],{type:'application/x-go-sgf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const baseName=sgfFilename.replace(/\.sgf$/i,'');
  a.download=baseName+'_analyzed.sgf';
  a.click();
  URL.revokeObjectURL(url);
  toast('SGF 저장 완료');
}

function uStat(state){
  const d=document.getElementById('sDot'),t=document.getElementById('sTxt');

  switch(state){
    case'connected':d.classList.add('on');t.textContent='연결됨';t.style.color='var(--success)';break;
    case'connecting':t.textContent='연결 중...';t.style.color='var(--accent)';break;
    case'error':d.classList.add('err');t.textContent='연결 실패';t.style.color='var(--danger)';break;

  }
}

    case'End':       e.preventDefault();navLast();break;

});

});

let _toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  if(_toastTimer){
    clearTimeout(_toastTimer);
    t.classList.remove('show');

  t.textContent=msg;
  // 강제 reflow 후 약간의 딜레이로 깜빡임 피드백
  void t.offsetWidth;
  requestAnimationFrame(()=>{
    t.classList.add('show');
    _toastTimer=setTimeout(()=>{t.classList.remove('show');_toastTimer=null},2400);
  });
}

// ── 분석 통계 ──
function showStatsOverlay(){
  const ov=document.getElementById('statsOverlay');
  if(ov.classList.contains('show')){ov.classList.remove('show');return}

  const analyzedCount=sgfCandidates.filter(v=>v!==null).length;
  const wrCount=sgfWinrates.filter(v=>v!==null).length;
  // 전체 분석된 기보만 통계 표시 (총 수의 80% 이상 분석 필요)
  if(totalMoves<2||analyzedCount<totalMoves*0.8){
    toast('전체 분석된 기보만 통계를 볼 수 있습니다');return;
  }

  // 일치율 계산
  const bTop1=[],bTop5=[],wTop1=[],wTop5=[];
  for(let i=0;i<totalMoves-1;i++){
    const cd=sgfCandidates[i];
    if(!cd||!cd.length)continue;
    const nextMv=sgfMoves[i+1];
    if(!nextMv||nextMv.pass||nextMv.r===undefined||nextMv.c===undefined)continue;
    const actual=cL[nextMv.c]+String(BS-nextMv.r);
    const isBlack=nextMv.color===B;
    const top1=cd[0]&&cd[0].move.trim()===actual;
    const top5=cd.slice(0,5).some(c=>c.move.trim()===actual);
    if(isBlack){bTop1.push(top1?1:0);bTop5.push(top5?1:0)}
    else{wTop1.push(top1?1:0);wTop5.push(top5?1:0)}
  }

  // 실착 감지 — 승률 하락 큰 순으로 전부 수집
  const allBlunders=[];
  for(let i=1;i<totalMoves;i++){
    if(sgfWinrates[i]===null||sgfWinrates[i-1]===null)continue;
    const mv=sgfMoves[i];
    const isBlack=mv.color===B;
    const prev=sgfWinrates[i-1],curr=sgfWinrates[i];
    const drop=isBlack?(prev-curr):(curr-prev);
    // 집수 차이 (scoreLead)
    let slDiff=null;
    if(sgfScoreLeads[i]!==null&&sgfScoreLeads[i-1]!==null){
      slDiff=isBlack?(sgfScoreLeads[i-1]-sgfScoreLeads[i]):(sgfScoreLeads[i]-sgfScoreLeads[i-1]);
    }
    if(drop>0) allBlunders.push({move:i+1,drop,slDiff,color:isBlack?'흑':'백'});
  }
  allBlunders.sort((a,b)=>b.drop-a.drop);
  const topBlunders=allBlunders.slice(0,5);

  const pct=(arr)=>{if(!arr.length)return'—';return(arr.reduce((a,b)=>a+b,0)/arr.length*100).toFixed(1)+'%'};

  let html='<div class="stats-title">분석 통계</div>';

  // AI 일치율 (블루스팟)
  html+='<div class="stats-section">';
  html+='<div class="stats-section-title">AI 일치율 (블루스팟)</div>';
  html+='<div class="stats-row"><span>● 흑 <span class="stats-val">'+pct(bTop1)+'</span></span>';
  html+='<span>○ 백 <span class="stats-val">'+pct(wTop1)+'</span></span></div>';
  html+='</div>';

  // AI 일치율 (상위 5수)
  html+='<div class="stats-section">';
  html+='<div class="stats-section-title">AI 일치율 (상위 5수)</div>';
  html+='<div class="stats-row"><span>● 흑 <span class="stats-val">'+pct(bTop5)+'</span></span>';
  html+='<span>○ 백 <span class="stats-val">'+pct(wTop5)+'</span></span></div>';
  html+='</div>';

  // 실착
  html+='<div class="stats-section">';
  html+='<div class="stats-section-title">실착</div>';
  if(topBlunders.length===0){
    html+='<div style="font-size:11px;color:var(--text-dim)">큰 승률 하락 없음</div>';
  }else{
    topBlunders.forEach(b=>{
      html+='<div class="stats-blunder" onclick="closeStatsAndGo('+b.move+')">';
      html+='<span class="stats-blunder-move">'+b.color+' '+b.move+'수</span>';
      let dropText='-'+b.drop.toFixed(1)+'%';
      if(b.slDiff!==null&&b.slDiff>0) dropText+='<span style="font-weight:400;margin-left:6px">-'+b.slDiff.toFixed(1)+'집</span>';
      html+='<span class="stats-blunder-drop">'+dropText+'</span>';
      html+='</div>';
    });
  }
  html+='</div>';

  html+='<div style="margin-top:10px"><button class="btn" onclick="document.getElementById(\'statsOverlay\').classList.remove(\'show\')" style="padding:8px 24px;font-size:12px">닫기</button></div>';

  document.getElementById('statsContent').innerHTML=html;
  ov.classList.add('show');
}

function closeStatsAndGo(moveNum){
  document.getElementById('statsOverlay').classList.remove('show');
  goToMove(moveNum);
}

// ── 착점 분석 모드 ──
function toggleProbeMode(){
  const url=document.getElementById('apiUrl').value.trim();
  if(!url||!aiMode){toast('AI 연결 필요');return}
  if(!totalMoves){toast('SGF 파일 필요');return}
  probeMode=!probeMode;
  const btn=document.getElementById('btnProbe');
  const bw=document.querySelector('.bw');
  if(probeMode){
    // 놓아보기 중이면 해제
    if(tryMode==='placing'){restoreTrySnapshot();tryMode='ready';tryMoveLog=[];tryViewIdx=0;cands=[];aGen++;updateTryBtn()}
    btn.classList.add('at');
    bw.classList.add('probe-mode');
    probeMarkers=[];
    toast('착점 분석: 빈 곳을 클릭');
  }else{
    btn.classList.remove('at');
    bw.classList.remove('probe-mode');
    probeMarkers=[];
    // 이전 후보수 복원
    if(currentMove>0&&sgfCandidates[currentMove-1]){
      cands=sgfCandidates[currentMove-1];
    }else if(currentMove===0&&initCands){
      cands=initCands;
    }
    if(aiMode&&analysisEnabled&&!analysisPaused&&!cands.length) scheduleAnalysis();
  }
  draw();
}

async function reqProbeAnalysis(r,c){
  const url=document.getElementById('apiUrl').value.trim();
  if(!url||!aiMode||probeLock)return;
  probeLock=true;
  const coord=cL[c]+String(BS-r);
  const clr=cp===B?'black':'white';
  document.getElementById('tho').textContent='착점 분석 중...';
  document.getElementById('tho').classList.add('show');
  try{
    // visits 설정
    await setVisitsToServer();
    // 현재 수순 + 착점 좌표를 동기화
    const moves=buildMovesForAPI();
    moves.push({color:clr,coord:coord});
    await fetch(url+'/sync',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({moves,board_size:BS,rules:currentRules})
    });
    // 착점 후 국면 분석
    const nextClr=clr==='black'?'white':'black';
    const resp=await fetch(url+'/analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({color:nextClr,duration:60,rules:currentRules})
    });
    const data=await resp.json();
    document.getElementById('tho').classList.remove('show');
    probeLock=false;
    if(!probeMode)return; // 모드 해제됐으면 무시
    if(data.moves&&data.moves.length){
      const wr0=data.moves[0].winrate!==undefined?normalizeWR(data.moves[0].winrate):null;
      if(wr0!==null){
        // 흑 기준 승률로 변환
        const bwr=nextClr==='black'?wr0:(100-wr0);
        let sl=null;
        if(data.scoreLead!==undefined) sl=nextClr==='black'?data.scoreLead:-data.scoreLead;
        else if(data.moves[0].scoreLead!==undefined) sl=nextClr==='black'?data.moves[0].scoreLead:-data.moves[0].scoreLead;
        // 착수자 기준 승률 (표시용)
        const displayWr=clr==='black'?bwr:(100-bwr);
        probeMarkers.push({r,c,winrate:displayWr,bwr,scoreLead:sl});
        draw();
      }
    }
    // 원래 수순으로 서버 복원
    await syncToServer(url);
  }catch(err){
    document.getElementById('tho').classList.remove('show');
    probeLock=false;
    toast('착점 분석 실패');
  }
}

function drawProbeMarkers(){
  if(!probeMarkers.length)return;
  const m=margin,rad=cs*.48;
  const isBlk=candTextColor==='black';
  const mainClr=isBlk?'#000':'#fff';
  const mainShadow=isBlk?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.4)';
  const subClr=isBlk?'rgba(0,0,0,0.85)':'rgba(255,255,255,0.85)';
  probeMarkers.forEach(mk=>{
    const x=m+mk.c*cs,y=m+mk.r*cs;
    ctx.save();
    ctx.shadowColor='rgba(50,205,100,.4)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(x,y,rad,0,Math.PI*2);
    ctx.fillStyle='rgba(50,205,100,.82)';ctx.fill();
    ctx.restore();
    const wr=mk.winrate.toFixed(1);
    const sl=mk.scoreLead!=null?(mk.scoreLead>=0?'+':'')+mk.scoreLead.toFixed(1):null;
    const dual=(candDisplay==='wr_sl'||candDisplay==='sl_wr')&&sl!==null;
    if(dual){
      const isWrFirst=candDisplay==='wr_sl';
      const topText=isWrFirst?wr:sl;
      const botText=isWrFirst?sl:wr;
      const topFs=Math.max(11,cs*.33);
      const botFs=Math.max(10,cs*.28);
      const gap=topFs*.45;
      ctx.save();ctx.translate(x,y);ctx.scale(0.92,1);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font=`bold ${topFs}px sans-serif`;
      ctx.fillStyle=mainShadow;ctx.fillText(topText,0.7,-gap+0.7);
      ctx.fillStyle=mainClr;ctx.fillText(topText,0,-gap);
      ctx.font=`bold ${botFs}px sans-serif`;
      ctx.fillStyle=subClr;ctx.fillText(botText,0,gap);
      ctx.restore();
    }else{
      const text=(candDisplay==='sl'&&sl!==null)?sl:wr;
      const fs=Math.max(12,cs*.34);
      ctx.save();ctx.translate(x,y);ctx.scale(0.92,1);
      ctx.font=`bold ${fs}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle=mainShadow;ctx.fillText(text,0.7,0.7);
      ctx.fillStyle=mainClr;ctx.fillText(text,0,0);
      ctx.restore();
    }
  });
}

// ── 형세 판단 ──
function calcTerritoryInfo(){
  if(ownData.length!==BS*BS)return null;
  let bTerritory=0,wTerritory=0,bDead=0,wDead=0;
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    const v=ownData[r*BS+c];
    if(board[r][c]===E){
      if(v>=terrThresh) bTerritory+=v;
      else if(v<=-terrThresh) wTerritory+=Math.abs(v);
    }else{
      const isDead=(board[r][c]===B&&v<-deadThresh)||(board[r][c]===W&&v>deadThresh);
      if(isDead){
        if(board[r][c]===B) bDead++;
        else wDead++;
      }
    }
  }
  // 0.5 단위 반올림
  bTerritory=Math.round(bTerritory*2)/2;
  wTerritory=Math.round(wTerritory*2)/2;
  return{bTerritory,wTerritory,bDead,wDead};
}

function showTerritoryOverlay(){
  const info=calcTerritoryInfo();
  if(!info)return;
  const sl=currentMove>0?sgfScoreLeads[currentMove-1]:null;
  const overlay=document.getElementById('territoryOverlay');
  const titleEl=document.getElementById('territoryTitle');
  const infoEl=document.getElementById('territoryInfo');
  // 타이틀: scoreLead → 가장 가까운 n.5집으로 반올림 (덤 반영)
  if(sl!==null){
    const side=sl>=0?'흑':'백';
    const abs=Math.abs(sl);
    const half=Math.round(abs-0.5)+0.5; // 가장 가까운 n.5
    const display=half<0?0.5:half;
    titleEl.textContent=side+' '+display.toFixed(1)+'집 유리';
  }else{
    titleEl.textContent='형세 판단';
  }
  // 서브: 추정 영역/사석 — 깔끔한 2열 배치
  let html='<div style="display:flex;justify-content:center;gap:20px;margin-bottom:4px">';
  html+='<span>● 흑 '+info.bTerritory.toFixed(1)+'집</span>';
  html+='<span>○ 백 '+info.wTerritory.toFixed(1)+'집</span>';
  html+='</div>';
  // 따낸 돌 (실제 캡처)
  html+='<div style="display:flex;justify-content:center;gap:20px">';
  html+='<span>흑 사석 '+capB+'</span>';
  html+='<span>백 사석 '+capW+'</span>';
  html+='</div>';
  infoEl.innerHTML=html;
  overlay.classList.add('show');
}

function updateTerritoryBtns(){
  const rBtn=document.getElementById('btnTerritoryRemote');

function toggleTerritory(){
  const overlay=document.getElementById('territoryOverlay');
  if(showTerritory){
    showTerritory=false;
    overlay.classList.remove('show');
    updateTerritoryBtns();
    draw();
    return;
  }
  if(!totalMoves){toast('SGF 파일 필요');return}
  // 이미 ownership 데이터 있으면 즉시 표시
  if(ownData.length===BS*BS){
    showTerritory=true;
    updateTerritoryBtns();
    draw();
    showTerritoryOverlay();
    return;
  }
  // 서버 연결 확인
  const url=document.getElementById('apiUrl').value.trim();
  if(!url||!aiMode){toast('AI 연결 필요');return}
  // 형세 판단 중... 토스트
  const tho=document.getElementById('tho');
  tho.textContent='형세 판단 중...';tho.classList.add('show');
  // sync + analyze
  const clr=cp===B?'black':'white';
  const moves=[];
  for(let i=0;i<currentMove;i++){
    const mv=sgfMoves[i];
    if(!mv.pass) moves.push({color:mv.color===B?'black':'white',coord:cL[mv.c]+(BS-mv.r)});
    else moves.push({color:mv.color===B?'black':'white',coord:'pass'});
  }
  fetch(url+'/set_visits',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({visits:getVisits()})}).then(()=>{
    return fetch(url+'/sync',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({moves,board_size:BS})});
  }).then(()=>{
    return fetch(url+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({color:clr,duration:60})});
  }).then(r=>r.json()).then(data=>{
    if(data.ownership&&data.ownership.length===BS*BS){
      tho.classList.remove('show');
      ownData=clr==='black'?data.ownership:data.ownership.map(v=>-v);
      showTerritory=true;
      updateTerritoryBtns();
      draw();
      showTerritoryOverlay();
    }else{
      // 1회 재시도 (ownership 파싱 실패 대비)
      return fetch(url+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({color:clr,duration:60})})
        .then(r2=>r2.json()).then(data2=>{
          tho.classList.remove('show');
          if(data2.ownership&&data2.ownership.length===BS*BS){
            ownData=clr==='black'?data2.ownership:data2.ownership.map(v=>-v);
            showTerritory=true;
            draw();
            showTerritoryOverlay();
          }else{
            toast('형세 데이터 수신 실패');
          }
        });
    }
  }).catch(e=>{
    tho.classList.remove('show');
    toast('형세 판단 실패');
  });
}

(function setupRemoteControls(){

  // 데스크탑에서만 기본 표시 (모바일은 CSS에서 display:none)

  collapseBtn.addEventListener('click',()=>{
    remote.classList.toggle('collapsed');

    // 접기/펼치기 후 크기가 바뀌므로 화면 안쪽으로 재조정
    if(typeof ensureRemoteOnScreen==='function') ensureRemoteOnScreen();
  });
  // 상태 복원
  try{
    if(localStorage.getItem('goreview_remote_collapsed')==='1') remote.classList.add('collapsed');
  }catch{}
})();

// ============================================
// Remote: 드래그 + 위치 저장
// ============================================
let ensureRemoteOnScreen=null;
(function setupRemoteDrag(){
  const remote=document.getElementById('remote');
  const head=document.getElementById('remoteHead');
  let dx=0,dy=0,dragging=false;

  function placeDefault(){
    const w=remote.offsetWidth||320;
    const h=remote.offsetHeight||200;
    remote.style.left=(window.innerWidth-w-28)+'px';
    remote.style.top=(window.innerHeight-h-28)+'px';
  }
  ensureRemoteOnScreen=function(){
    const w=remote.offsetWidth||320;
    const h=remote.offsetHeight||200;
    const rect=remote.getBoundingClientRect();
    if(rect.width===0||rect.height===0||
       rect.right<50||rect.bottom<50||
       rect.left>window.innerWidth-50||rect.top>window.innerHeight-50){
      placeDefault();return;
    }
    let nx=Math.max(8,Math.min(window.innerWidth-w-8,rect.left));
    let ny=Math.max(8,Math.min(window.innerHeight-h-8,rect.top));
    remote.style.left=nx+'px';remote.style.top=ny+'px';
  };
  // 저장된 위치 복원
  try{
    const saved=localStorage.getItem('goreview_remote_pos');
    if(saved){
      const{left,top}=JSON.parse(saved);
      remote.style.left=left+'px';remote.style.top=top+'px';
      requestAnimationFrame(ensureRemoteOnScreen);
    }else{
      requestAnimationFrame(placeDefault);
    }
  }catch{placeDefault()}

  function onDown(e){
    if(e.target.closest('.icon-btn')) return;
    dragging=true;
    remote.classList.add('dragging');
    const rect=remote.getBoundingClientRect();
    const cx=e.clientX??e.touches?.[0]?.clientX;
    const cy=e.clientY??e.touches?.[0]?.clientY;
    dx=cx-rect.left;dy=cy-rect.top;
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging) return;
    const cx=e.clientX??e.touches?.[0]?.clientX;
    const cy=e.clientY??e.touches?.[0]?.clientY;
    let nx=cx-dx,ny=cy-dy;
    const w=remote.offsetWidth,h=remote.offsetHeight;
    nx=Math.max(8,Math.min(window.innerWidth-w-8,nx));
    ny=Math.max(8,Math.min(window.innerHeight-h-8,ny));
    remote.style.left=nx+'px';remote.style.top=ny+'px';
  }
  function onUp(){
    if(!dragging) return;
    dragging=false;
    remote.classList.remove('dragging');
    try{
      const rect=remote.getBoundingClientRect();
      localStorage.setItem('goreview_remote_pos',JSON.stringify({left:rect.left,top:rect.top}));
    }catch{}
  }
  head.addEventListener('mousedown',onDown);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onUp);
  head.addEventListener('touchstart',onDown,{passive:false});
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onUp);
  window.addEventListener('resize',()=>{
    if(typeof ensureRemoteOnScreen==='function') ensureRemoteOnScreen();
  });
})();
